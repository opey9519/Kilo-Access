name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: kiloregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t kiloregistry.azurecr.io/kilo-api:${GITHUB_SHA::8} ./server
          docker push kiloregistry.azurecr.io/kilo-api:${GITHUB_SHA::8}

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name kilo-api \
            --resource-group KiloAccess-Backend_group \
            --image kiloregistry.azurecr.io/kilo-api:${GITHUB_SHA::8}
